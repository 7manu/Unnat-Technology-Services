<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promo Poster Maker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <script defer src="script.js"></script>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
  </head>
  <body class="bg-dark text-light">
    <div class="container text-center my-5">
        <h6 style="background: yellowgreen;padding: 10px;border-radius: 5px;" class="fw-bold text-white">Developed By - <a style="color: black;font-weight: 700;" target="_blank" href="https://unnattechnologyservices.com/">Unnat Technology Services</a></h6>
      <h1 class="fw-bold text-white">Promo Poster Maker</h1>
      <div class="input-section">
        <input
          type="file"
          id="uploadImage"
          class="form-control my-3"
          accept="image/*"
        />
        <input
          type="text"
          id="customText"
          class="form-control my-2"
          placeholder="Enter promotional text"
        />
        <button id="generateBtn" class="btn btn-light btn-lg shadow-lg">
          Generate Poster
        </button>
      </div>

      <div class="canvas-container mt-4" style="display: none;">
        <canvas id="posterCanvas" class="shadow-lg rounded"></canvas>
      </div>

      <!-- <div class="mt-3">
        <button id="downloadBtn" class="btn btn-success btn-lg shadow-lg">
          Download
        </button>
        <button id="shareBtn" class="btn btn-warning btn-lg shadow-lg">
          Share
        </button>
      </div> -->
    </div>

    <div class="container mt-5">
      <h2 class="text-center text-white fw-bold">Your Posters</h2>
      <div id="gallery" class="row g-3"></div>
      <div class="text-center mt-3">
        <!-- <button id="loadMoreBtn" class="btn btn-outline-light">
          Load More
        </button> -->
      </div>
    </div>
  </body>
</html>
